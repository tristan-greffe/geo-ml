<svg width="32" height="36" viewBox="0 0 32 36" xmlns="http://www.w3.org/2000/svg">
  <!-- GIS layers stack — isometric perspective -->
  <!-- Layer 1: Photographie aérienne (bottom) -->
  <polygon points="2,35 20,35 28,30 10,30" fill="#1a1836"/>
  <!-- Layer 2: Modèle numérique de terrain -->
  <polygon points="2,29 20,29 28,24 10,24" fill="#2e2a5e"/>
  <!-- Layer 3: Réseaux -->
  <polygon points="2,23 20,23 28,18 10,18" fill="#474379"/>
  <!-- Layer 4: Occupation du sol -->
  <polygon points="2,17 20,17 28,12 10,12" fill="#7673b0"/>
  <!-- Layer 5: Limites administratives (top) -->
  <polygon points="2,11 20,11 28,6  10,6 " fill="#A6A3E2"/>
  <!-- Neural nodes on top layer -->
  <circle cx="12" cy="8"  r="1.5" fill="white" opacity="0.9"/>
  <circle cx="18" cy="8"  r="1.5" fill="white" opacity="0.9"/>
  <circle cx="24" cy="7"  r="1.5" fill="white" opacity="0.9"/>
  <line x1="12" y1="8" x2="18" y2="8" stroke="white" stroke-width="0.8" opacity="0.5"/>
  <line x1="18" y1="8" x2="24" y2="7" stroke="white" stroke-width="0.8" opacity="0.5"/>
</svg>
