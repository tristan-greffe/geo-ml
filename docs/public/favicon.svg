<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Hexagon = map tile -->
  <polygon points="16,1 29,8.5 29,23.5 16,31 3,23.5 3,8.5" fill="#474379"/>
  <!-- Central node -->
  <circle cx="16" cy="16" r="4" fill="#A6A3E2"/>
  <!-- Outer nodes -->
  <circle cx="16" cy="7"  r="2" fill="#A6A3E2" opacity="0.7"/>
  <circle cx="24" cy="11.5" r="2" fill="#A6A3E2" opacity="0.7"/>
  <circle cx="24" cy="20.5" r="2" fill="#A6A3E2" opacity="0.7"/>
  <circle cx="16" cy="25" r="2" fill="#A6A3E2" opacity="0.7"/>
  <circle cx="8"  cy="20.5" r="2" fill="#A6A3E2" opacity="0.7"/>
  <circle cx="8"  cy="11.5" r="2" fill="#A6A3E2" opacity="0.7"/>
  <!-- Connection lines -->
  <line x1="16" y1="16" x2="16" y2="7"    stroke="#A6A3E2" stroke-width="1" opacity="0.45"/>
  <line x1="16" y1="16" x2="24" y2="11.5" stroke="#A6A3E2" stroke-width="1" opacity="0.45"/>
  <line x1="16" y1="16" x2="24" y2="20.5" stroke="#A6A3E2" stroke-width="1" opacity="0.45"/>
  <line x1="16" y1="16" x2="16" y2="25"   stroke="#A6A3E2" stroke-width="1" opacity="0.45"/>
  <line x1="16" y1="16" x2="8"  y2="20.5" stroke="#A6A3E2" stroke-width="1" opacity="0.45"/>
  <line x1="16" y1="16" x2="8"  y2="11.5" stroke="#A6A3E2" stroke-width="1" opacity="0.45"/>
</svg>
